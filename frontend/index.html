<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 抽奖应用</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/toast.css">
  <!-- Load Three.js and XLSX from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
</head>

<body>
  <div id="toast-container" class="toast-container"></div>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🏆 奖项列表</h2>
        <div id="participant-count">参与人数: 0</div>
      </div>
      <div id="prize-list" class="prize-list">
        <!-- Prize items injected here -->
      </div>
      <div class="sidebar-footer">
        <button id="btn-reset" class="btn btn-danger small">全部重置</button>
      </div>
    </aside>

    <!-- Main Content (3D Canvas) -->
    <main class="main-content">
      <div id="canvas-container"></div>

      <!-- Controls -->
      <div class="controls">
        <div class="control-group">
          <input type="file" id="file-input" accept=".xlsx, .xls" hidden>
          <button id="btn-import" class="btn btn-icon" title="导入 Excel">📂 导入数据</button>
          <button id="btn-generate" class="btn btn-icon" title="生成测试数据">⚡ 测试数据</button>
        </div>

        <button id="btn-action" class="btn btn-primary btn-large">开始</button>

        <div class="control-group">
          <button id="btn-winners" class="btn btn-icon">📜 中奖名单</button>
          <button id="btn-settings" class="btn btn-icon">⚙️ 设置</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals -->
  <div id="winner-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🎉 中奖名单</h3>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <table id="winner-table">
          <thead>
            <tr>
              <th>奖项</th>
              <th>姓名</th>
              <th>电话</th>
              <th>部门</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button id="btn-export" class="btn btn-primary">导出 Excel</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚙️ 设置</h3>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>添加奖项</label>
          <div class="input-group">
            <div class="input-wrapper">
              <span class="input-label-icon">🏆</span>
              <input type="text" id="new-prize-name" placeholder="奖项名称 (如: 一等奖)">
            </div>
            <div class="input-wrapper">
              <span class="input-label-icon">👥</span>
              <input type="number" id="new-prize-count" value="1" min="1" placeholder="人数" title="中奖人数">
            </div>
            <button id="btn-add-prize" style="color: #1e293b;" class="btn btn-small">+</button>
          </div>
        </div>
        <div class="form-group">
          <label>背景图片</label>
          <input type="file" id="bg-input" accept="image/*">
        </div>
      </div>
    </div>
  </div>

  <!-- Celebration Overlay -->
  <div id="celebration-overlay" class="overlay hidden">
    <div class="winner-card">
      <div class="winner-title">恭喜中奖</div>
      <div id="winner-name" class="winner-name">姓名</div>
      <div id="winner-info" class="winner-info">电话 | 部门</div>
      <div id="winner-prize" class="winner-prize">奖项名称</div>
      <button id="btn-close-overlay" class="btn btn-outline">关闭</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/lottery3d.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
